<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Alex's Photo Portfolio</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>

    <div class = "center">

    <div class = "topBar">
    
    <h1>Alex's Photo Gallery</h1> 

    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a style = "border-bottom: 5px solid rgb(255, 255, 255);">Gallery</a></li>
    </ul>

    </div>

    <h2>Feel free to check out each custom caption! It took me a long time :)</h2>


    <div id="gallery" class = "gallery"></div>

    <div id = "modal" class = "modal">
      <button id = "modal-btn-prev" class="modal-btn" onclick="prevPhoto()">❮</button>
      <img id = "modal-image" src=""></img>
      <div id="modal-desc"></div>
      <button id = "modal-btn-close" class="modal-btn" onclick="closeModal()">✕</button>
      <button id = "modal-btn-next" class="modal-btn" onclick="nextPhoto()">❯</button>
    </div>
    
    </div>
    <script src="script.js"></script>
  </body>
</html>
